# Automatically label PRs by size (lines changed).
# Helps reviewers prioritize: XS PRs get fast reviews, XL PRs need careful scheduling.

name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  size-label:
    name: Label PR by size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/XS"
          xs_max_size: 10
          s_label: "size/S"
          s_max_size: 50
          m_label: "size/M"
          m_max_size: 200
          l_label: "size/L"
          l_max_size: 500
          xl_label: "size/XL"
          fail_if_xl: false
          message_if_xl: >
            ⚠️ This PR is quite large (+{additions}/-{deletions} lines).
            Consider breaking it into smaller, focused PRs for easier review.
          files_to_ignore: |
            "*.lock"
            "*.xcodeproj/*"
            "*.pbxproj"
            "Assets.xcassets/**"
