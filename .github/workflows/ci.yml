# CI workflow for FeedReader (Swift/iOS)
#
# Builds the Xcode project and runs unit tests on macOS runners
# using the iPhone simulator. Collects code coverage via xccov
# and generates a coverage report artifact.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    strategy:
      matrix:
        xcode: ['16.2']

    env:
      SCHEME: FeedReader
      PROJECT: FeedReader.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available --json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for runtime,devs in d['devices'].items():
            for dev in devs:
              if 'iPhone' in dev['name']:
                print(f\"{dev['name']} — {runtime}\")
          " | head -20

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            || true

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty

      - name: Run tests with code coverage
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults \
            | xcpretty

      - name: Extract code coverage report
        if: always()
        run: |
          echo "=== Code Coverage Report ==="

          # Find the xccovreport inside the result bundle
          REPORT=$(find TestResults -name '*.xccovreport' 2>/dev/null | head -1)
          ARCHIVE=$(find TestResults -name '*.xccovarchive' 2>/dev/null | head -1)

          if [ -n "$ARCHIVE" ]; then
            echo "--- Per-file coverage ---"
            xcrun xccov view --report --json "$ARCHIVE" > coverage.json 2>/dev/null || true

            if [ -f coverage.json ]; then
              # Generate human-readable summary
              python3 << 'PYEOF'
          import json, sys

          try:
              with open("coverage.json") as f:
                  data = json.load(f)

              targets = data.get("targets", [])
              total_covered = 0
              total_executable = 0

              print(f"{'File':<50} {'Lines':>8} {'Covered':>8} {'Coverage':>10}")
              print("-" * 80)

              for target in targets:
                  tname = target.get("name", "Unknown")
                  # Skip test targets
                  if "Test" in tname:
                      continue
                  for src_file in target.get("files", []):
                      fname = src_file.get("name", "?")
                      cov = src_file.get("lineCoverage", 0)
                      executable = src_file.get("executableLines", 0)
                      covered = src_file.get("coveredLines", 0)
                      total_covered += covered
                      total_executable += executable
                      pct = f"{cov * 100:.1f}%"
                      print(f"{fname:<50} {executable:>8} {covered:>8} {pct:>10}")

              if total_executable > 0:
                  overall = total_covered / total_executable * 100
                  print("-" * 80)
                  print(f"{'TOTAL':<50} {total_executable:>8} {total_covered:>8} {overall:>9.1f}%")
                  print(f"\n✅ Overall code coverage: {overall:.1f}%")

                  # Write coverage percentage to file for badge generation
                  with open("coverage-percent.txt", "w") as pf:
                      pf.write(f"{overall:.1f}")
              else:
                  print("No executable lines found in coverage data.")
          except Exception as e:
              print(f"Warning: Could not parse coverage JSON: {e}", file=sys.stderr)
          PYEOF
            fi
          elif [ -n "$REPORT" ]; then
            echo "Found xccovreport but no archive. Listing report:"
            xcrun xccov view --report "$REPORT" 2>/dev/null || echo "(could not read report)"
          else
            echo "No coverage data found in TestResults bundle."
            echo "Contents of TestResults:"
            find TestResults -type f 2>/dev/null | head -30
          fi

      - name: Enforce coverage threshold
        run: |
          MIN_COVERAGE=40
          if [ -f coverage-percent.txt ]; then
            PCT=$(cat coverage-percent.txt)
            echo "Coverage: ${PCT}%  (minimum: ${MIN_COVERAGE}%)"
            if (( $(echo "$PCT < $MIN_COVERAGE" | bc -l) )); then
              echo "::error::Code coverage ${PCT}% is below the minimum threshold of ${MIN_COVERAGE}%"
              exit 1
            fi
            echo "✅ Coverage gate passed"
          else
            echo "::warning::No coverage data found — skipping enforcement"
          fi

      - name: Detect per-file coverage regressions
        if: always()
        run: |
          if [ ! -f coverage.json ]; then
            echo "No coverage data to analyze."
            exit 0
          fi
          python3 << 'PYEOF'
          import json, sys

          UNCOVERED_THRESHOLD = 0.10  # Flag files with < 10% coverage

          try:
              with open("coverage.json") as f:
                  data = json.load(f)

              low_coverage_files = []
              for target in data.get("targets", []):
                  if "Test" in target.get("name", ""):
                      continue
                  for src_file in target.get("files", []):
                      fname = src_file.get("name", "?")
                      cov = src_file.get("lineCoverage", 0)
                      executable = src_file.get("executableLines", 0)
                      if executable >= 10 and cov < UNCOVERED_THRESHOLD:
                          low_coverage_files.append((fname, cov * 100, executable))

              if low_coverage_files:
                  print(f"⚠️  {len(low_coverage_files)} file(s) with <10% coverage (≥10 executable lines):")
                  for fname, pct, lines in sorted(low_coverage_files, key=lambda x: x[1]):
                      print(f"  {fname}: {pct:.1f}% ({lines} lines)")
                  print("\nConsider adding tests for these files.")
              else:
                  print("✅ No critically uncovered files detected.")
          except Exception as e:
              print(f"Warning: {e}", file=sys.stderr)
          PYEOF

      - name: Generate coverage badge
        if: always()
        run: |
          if [ -f coverage-percent.txt ]; then
            PCT=$(cat coverage-percent.txt)
            # Determine badge color
            COLOR="red"
            if (( $(echo "$PCT >= 80" | bc -l) )); then
              COLOR="brightgreen"
            elif (( $(echo "$PCT >= 60" | bc -l) )); then
              COLOR="green"
            elif (( $(echo "$PCT >= 40" | bc -l) )); then
              COLOR="yellow"
            elif (( $(echo "$PCT >= 20" | bc -l) )); then
              COLOR="orange"
            fi
            echo "Coverage: ${PCT}% (color: $COLOR)"
            echo "Badge URL: https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}"
          else
            echo "No coverage data available for badge."
          fi

      - name: Coverage job summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python3 << 'PYEOF'
          import json, os

          try:
              with open("coverage.json") as f:
                  data = json.load(f)

              summary = "## 📊 Code Coverage Report\n\n"
              summary += "| File | Lines | Covered | Coverage |\n"
              summary += "|------|------:|--------:|---------:|\n"

              total_exec = 0
              total_cov = 0
              rows = []

              for target in data.get("targets", []):
                  if "Test" in target.get("name", ""):
                      continue
                  for src in target.get("files", []):
                      name = src.get("name", "?")
                      exe = src.get("executableLines", 0)
                      cov = src.get("coveredLines", 0)
                      pct = (cov / exe * 100) if exe > 0 else 0
                      total_exec += exe
                      total_cov += cov
                      if exe >= 5:
                          icon = "🟢" if pct >= 60 else "🟡" if pct >= 30 else "🔴"
                          rows.append((name, exe, cov, pct, icon))

              for name, exe, cov, pct, icon in sorted(rows, key=lambda r: r[3]):
                  summary += f"| {icon} {name} | {exe} | {cov} | {pct:.1f}% |\n"

              overall = (total_cov / total_exec * 100) if total_exec > 0 else 0
              summary += f"\n**Overall: {overall:.1f}%** ({total_cov}/{total_exec} lines)\n"

              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(summary)

              print(f"Coverage summary written ({overall:.1f}%)")
          except Exception as e:
              print(f"Warning: {e}")
          PYEOF
          else
            echo "No coverage data for summary."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage-percent.txt
          retention-days: 14

      - name: Convert coverage to Codecov format
        if: always()
        run: |
          ARCHIVE=$(find TestResults -name '*.xccovarchive' 2>/dev/null | head -1)
          if [ -n "$ARCHIVE" ]; then
            # Generate lcov-compatible coverage from xccovarchive
            python3 << 'PYEOF'
          import json, os

          try:
              with open("coverage.json") as f:
                  data = json.load(f)

              with open("coverage.lcov", "w") as lcov:
                  for target in data.get("targets", []):
                      if "Test" in target.get("name", ""):
                          continue
                      for src_file in target.get("files", []):
                          path = src_file.get("path", src_file.get("name", "unknown"))
                          lcov.write(f"SF:{path}\n")
                          for func in src_file.get("functions", []):
                              name = func.get("name", "?")
                              line = func.get("lineNumber", 0)
                              covered = func.get("coveredLines", 0)
                              lcov.write(f"FN:{line},{name}\n")
                              lcov.write(f"FNDA:{covered},{name}\n")
                          executable = src_file.get("executableLines", 0)
                          covered = src_file.get("coveredLines", 0)
                          lcov.write(f"LF:{executable}\n")
                          lcov.write(f"LH:{covered}\n")
                          lcov.write("end_of_record\n")
              print("Generated coverage.lcov")
          except Exception as e:
              print(f"Warning: Could not generate lcov: {e}")
          PYEOF
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          flags: xcode-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  spm-test:
    name: SPM Test (FeedReaderCore)
    runs-on: macos-latest

    strategy:
      matrix:
        xcode: ['16.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
          swift --version

      - name: Run SPM tests with coverage
        run: |
          swift test --enable-code-coverage 2>&1

      - name: Extract SPM coverage
        run: |
          PROFDATA=$(find .build -name 'default.profdata' 2>/dev/null | head -1)
          BIN=$(find .build -name 'FeedReaderCorePackageTests.xctest' -o -name '*PackageTests' -type f 2>/dev/null | head -1)

          if [ -n "$PROFDATA" ] && [ -n "$BIN" ]; then
            echo "=== SPM Code Coverage (FeedReaderCore) ==="
            xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' 2>/dev/null || true
            echo ""
            echo "--- Detailed per-file coverage ---"
            xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' --show-functions=false 2>/dev/null || true

            # Export lcov for Codecov
            xcrun llvm-cov export "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' -format=lcov > spm-coverage.lcov 2>/dev/null || true
          else
            echo "SPM coverage data not found."
            echo "PROFDATA: $PROFDATA"
            echo "BIN: $BIN"
            find .build -name '*.profdata' 2>/dev/null || true
          fi

      - name: Enforce SPM coverage threshold
        run: |
          PROFDATA=$(find .build -name 'default.profdata' 2>/dev/null | head -1)
          BIN=$(find .build -name 'FeedReaderCorePackageTests.xctest' -o -name '*PackageTests' -type f 2>/dev/null | head -1)
          MIN_COVERAGE=40
          if [ -n "$PROFDATA" ] && [ -n "$BIN" ]; then
            # Extract total coverage percentage
            REPORT=$(xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' 2>/dev/null | tail -1)
            PCT=$(echo "$REPORT" | awk '{print $NF}' | tr -d '%')
            if [ -n "$PCT" ]; then
              echo "SPM Coverage: ${PCT}%  (minimum: ${MIN_COVERAGE}%)"
              if (( $(echo "$PCT < $MIN_COVERAGE" | bc -l) )); then
                echo "::error::SPM coverage ${PCT}% is below minimum ${MIN_COVERAGE}%"
                exit 1
              fi
              echo "✅ SPM coverage gate passed"
            fi
          else
            echo "::warning::No SPM coverage data — skipping enforcement"
          fi

      - name: Upload SPM coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: spm-coverage.lcov
          flags: spm-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
        continue-on-error: true
