# CI workflow for FeedReader (Swift/iOS)
#
# Builds the Xcode project and runs unit tests on macOS runners
# using the iPhone simulator. Collects code coverage via xccov
# and generates a coverage report artifact.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 30

    strategy:
      matrix:
        xcode: ['16.2']

    env:
      SCHEME: FeedReader
      PROJECT: FeedReader.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
          xcodebuild -version

      - name: List available simulators
        run: |
          xcrun simctl list devices available --json | python3 - <<'PYEOF' | head -20
          import json, sys
          d = json.load(sys.stdin)
          for runtime, devs in d['devices'].items():
              for dev in devs:
                  if 'iPhone' in dev['name']:
                      print(f"{dev['name']} - {runtime}")
          PYEOF

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            || true

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            | xcpretty

      - name: Run tests with code coverage
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults \
            | xcpretty

      - name: Extract code coverage report
        if: always()
        run: |
          echo "=== Code Coverage Report ==="

          # Find the xccovreport inside the result bundle
          REPORT=$(find TestResults -name '*.xccovreport' 2>/dev/null | head -1)
          ARCHIVE=$(find TestResults -name '*.xccovarchive' 2>/dev/null | head -1)

          if [ -n "$ARCHIVE" ]; then
            echo "--- Per-file coverage ---"
            xcrun xccov view --report --json "$ARCHIVE" > coverage.json 2>/dev/null || true
            # Per-file table + coverage-percent.txt + regression report + step summary
            # are all produced by scripts/coverage_report.py (see that file for details).
            python3 scripts/coverage_report.py --input coverage.json || true
          elif [ -n "$REPORT" ]; then
            echo "Found xccovreport but no archive. Listing report:"
            xcrun xccov view --report "$REPORT" 2>/dev/null || echo "(could not read report)"
          else
            echo "No coverage data found in TestResults bundle."
            echo "Contents of TestResults:"
            find TestResults -type f 2>/dev/null | head -30
          fi

      - name: Enforce coverage threshold
        run: |
          if [ -f coverage.json ]; then
            python3 scripts/coverage_report.py \
              --input coverage.json \
              --min-coverage 40
          else
            echo "::warning::No coverage data found - skipping enforcement"
          fi

      - name: Generate coverage badge
        if: always()
        run: |
          if [ -f coverage-percent.txt ]; then
            PCT=$(cat coverage-percent.txt)
            # Determine badge color
            COLOR="red"
            if (( $(echo "$PCT >= 80" | bc -l) )); then
              COLOR="brightgreen"
            elif (( $(echo "$PCT >= 60" | bc -l) )); then
              COLOR="green"
            elif (( $(echo "$PCT >= 40" | bc -l) )); then
              COLOR="yellow"
            elif (( $(echo "$PCT >= 20" | bc -l) )); then
              COLOR="orange"
            fi
            echo "Coverage: ${PCT}% (color: $COLOR)"
            echo "Badge URL: https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}"
          else
            echo "No coverage data available for badge."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage-percent.txt
          retention-days: 14

      - name: Convert coverage to Codecov format
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python3 scripts/coverage_report.py \
              --input coverage.json \
              --emit-lcov coverage.lcov
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          flags: xcode-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  spm-test:
    name: SPM Test (FeedReaderCore)
    runs-on: macos-latest
    timeout-minutes: 20

    strategy:
      matrix:
        xcode: ['16.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-

      - name: Run SPM tests with coverage
        run: |
          swift test --enable-code-coverage 2>&1

      - name: Extract SPM coverage
        run: |
          PROFDATA=$(find .build -name 'default.profdata' 2>/dev/null | head -1)
          BIN=$(find .build -name 'FeedReaderCorePackageTests.xctest' -o -name '*PackageTests' -type f 2>/dev/null | head -1)

          if [ -n "$PROFDATA" ] && [ -n "$BIN" ]; then
            echo "=== SPM Code Coverage (FeedReaderCore) ==="
            xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' 2>/dev/null || true
            echo ""
            echo "--- Detailed per-file coverage ---"
            xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' --show-functions=false 2>/dev/null || true

            # Export lcov for Codecov
            xcrun llvm-cov export "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' -format=lcov > spm-coverage.lcov 2>/dev/null || true
          else
            echo "SPM coverage data not found."
            echo "PROFDATA: $PROFDATA"
            echo "BIN: $BIN"
            find .build -name '*.profdata' 2>/dev/null || true
          fi

      - name: Enforce SPM coverage threshold
        run: |
          PROFDATA=$(find .build -name 'default.profdata' 2>/dev/null | head -1)
          BIN=$(find .build -name 'FeedReaderCorePackageTests.xctest' -o -name '*PackageTests' -type f 2>/dev/null | head -1)
          MIN_COVERAGE=40
          if [ -n "$PROFDATA" ] && [ -n "$BIN" ]; then
            # Extract total coverage percentage
            REPORT=$(xcrun llvm-cov report "$BIN" -instr-profile="$PROFDATA" \
              --ignore-filename-regex='Tests/' 2>/dev/null | tail -1)
            PCT=$(echo "$REPORT" | awk '{print $NF}' | tr -d '%')
            if [ -n "$PCT" ]; then
              echo "SPM Coverage: ${PCT}%  (minimum: ${MIN_COVERAGE}%)"
              if (( $(echo "$PCT < $MIN_COVERAGE" | bc -l) )); then
                echo "::error::SPM coverage ${PCT}% is below minimum ${MIN_COVERAGE}%"
                exit 1
              fi
              echo "✅ SPM coverage gate passed"
            fi
          else
            echo "::warning::No SPM coverage data - skipping enforcement"
          fi

      - name: Upload SPM coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: spm-coverage.lcov
          flags: spm-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  duplicate-sources:
    name: Reject duplicate sources between app and Core
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guards against the divergent-forks problem documented in #110:
      # a file with the same basename in both FeedReader/ and
      # Sources/FeedReaderCore/ silently drifts and ships subtly
      # different behavior to the two targets.
      #
      # The allowlist below is for files whose app-target copy is still
      # referenced by FeedReader.xcodeproj and consumed by the UIKit
      # layer; consolidating them is tracked in #110.
      - name: Reject duplicated source files
        shell: bash
        run: |
          set -euo pipefail
          allow_file="$(mktemp)"
          cat > "$allow_file" <<'EOF'
          OPMLManager.swift
          EOF

          comm -12 \
            <(cd FeedReader && ls *.swift 2>/dev/null | sort) \
            <(cd Sources/FeedReaderCore && ls *.swift 2>/dev/null | sort) \
            > dupes-all.txt

          # Subtract allowlist.
          grep -vxF -f "$allow_file" dupes-all.txt > dupes.txt || true

          if [ -s dupes.txt ]; then
            echo "::error::Duplicated sources between app and Core target:"
            sed 's/^/  - /' dupes.txt
            echo
            echo "Each duplicate eventually drifts. Move the canonical"
            echo "copy into Sources/FeedReaderCore/ and delete the app-side"
            echo "copy, or add the basename to the allowlist in"
            echo ".github/workflows/ci.yml with a tracking issue link."
            exit 1
          fi

          echo "No disallowed duplicate sources."
          if [ -s dupes-all.txt ]; then
            echo
            echo "Allowlisted duplicates still present (tracked in #110):"
            sed 's/^/  - /' dupes-all.txt
          fi
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
        continue-on-error: true
