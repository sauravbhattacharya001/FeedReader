# CI for the small Python helpers that live alongside the Swift code.
#
# The main CI workflow (ci.yml) needs a macOS runner with Xcode to build
# FeedReader itself, and that's expensive (5–10 min) for changes that
# only touch `scripts/` or `Tests/test_*.py`. This workflow runs on a
# cheap Ubuntu runner so coverage-helper regressions get caught in
# seconds without burning macOS minutes.
#
# Stdlib-only by design — `scripts/coverage_report.py` deliberately
# avoids dependencies so it can be called unconditionally from any CI
# step. Keep the only third-party install here as `pytest` itself.

name: Python Helpers

on:
  push:
    branches: [master]
    paths:
      - 'scripts/**/*.py'
      - 'Tests/test_*.py'
      - '.github/workflows/python-helpers.yml'
  pull_request:
    branches: [master]
    paths:
      - 'scripts/**/*.py'
      - 'Tests/test_*.py'
      - '.github/workflows/python-helpers.yml'

concurrency:
  group: python-helpers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        # Match the Python versions xccov/xcrun shells we typically run
        # under in `ci.yml` (macOS runners ship 3.11+), plus a forward
        # canary on the latest stable.
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile-check scripts (fast feedback for syntax errors)
        run: |
          python -m compileall -q scripts

      - name: Run coverage-helper tests
        run: |
          python -m pytest Tests/test_coverage_report.py -v
