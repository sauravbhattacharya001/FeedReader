name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Swift Package
        run: swift package resolve

      - name: Build library (Release)
        run: swift build -c release

      - name: Run tests
        run: swift test

  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changes }}

            ## Installation

            ### Swift Package Manager
            ```swift
            .package(url: "https://github.com/sauravbhattacharya001/FeedReader.git", from: "${{ github.ref_name }}")
            ```

            ### CocoaPods
            ```ruby
            pod 'FeedReaderCore', '~> ${{ github.ref_name }}'
            ```
