# Mark stale issues and PRs, then close them if no activity follows.
# Runs daily at 03:00 UTC. Exempt issues with certain labels from staleness.

name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please
            leave a comment or remove the `stale` label.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days
            with no activity. Feel free to reopen if it's still relevant.
          exempt-issue-labels: pinned,security,bug,enhancement,good first issue

          # Pull Requests
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had recent activity. It will be closed in 14 days if
            no further activity occurs.
          close-pr-message: >
            This pull request was closed because it has been stale for
            14 days with no activity.
          exempt-pr-labels: pinned,dependencies,security

          # Limits
          operations-per-run: 50
          ascending: true
