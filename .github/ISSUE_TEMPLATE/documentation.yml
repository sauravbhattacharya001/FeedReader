name: 📖 Documentation Improvement
description: Suggest improvements to documentation, guides, or code comments
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation! Clear docs make the project better for everyone.

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Area
      description: Which area of documentation needs improvement?
      options:
        - README.md
        - Code comments / docstrings
        - API documentation
        - Setup / Installation guide
        - Architecture overview
        - Contributing guide
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current State
      description: What's currently unclear, missing, or incorrect?
      placeholder: "The installation section doesn't mention that CocoaPods is required..."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Improvement
      description: What should the documentation say instead?
      placeholder: "Add a Prerequisites section listing CocoaPods and minimum Xcode version..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any screenshots, links, or other context that would help.
    validations:
      required: false
