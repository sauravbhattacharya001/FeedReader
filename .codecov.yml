codecov:
  require_ci_to_pass: false

coverage:
  precision: 1
  round: down
  range: "40...90"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: false
    patch:
      default:
        target: 50%
        informational: false

  flags:
    xcode-tests:
      paths:
        - FeedReader/
      carryforward: true
    spm-tests:
      paths:
        - Sources/
      carryforward: true

ignore:
  - "FeedReaderTests/"
  - "Tests/"
  - "docs/"
  - "*.md"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
